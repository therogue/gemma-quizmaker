<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemma Quizmaker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      display: flex;
      height: 100dvh;
      overflow: hidden;
      background: #f5f5f5;
    }

    /* ── Sidebar ──────────────────────────────────────────────────────────── */

    #sidebar {
      width: 220px;
      min-width: 220px;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      color: #fff;
    }

    #sidebar-title {
      padding: 16px 14px 12px;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.6;
    }

    #new-conv-btn {
      margin: 0 10px 10px;
      padding: 8px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #fff;
      font-size: 0.86rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    #new-conv-btn:hover { background: rgba(255,255,255,0.16); }

    #conv-list { flex: 1; overflow-y: auto; padding: 0 6px 10px; }

    .conv-item {
      padding: 8px 10px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.86rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0.7;
      transition: background 0.12s, opacity 0.12s;
      margin-bottom: 2px;
    }
    .conv-item:hover { background: rgba(255,255,255,0.1); opacity: 1; }
    .conv-item.active { background: rgba(255,255,255,0.16); opacity: 1; font-weight: 600; }

    /* ── Center: chat thread ──────────────────────────────────────────────── */

    #chat-col {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #e0e0e0;
    }

    #thread {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .empty-state {
      margin: auto;
      color: #bbb;
      font-size: 0.92rem;
      text-align: center;
    }

    .bubble {
      max-width: 580px;
      padding: 11px 15px;
      border-radius: 12px;
      line-height: 1.55;
      font-size: 0.92rem;
      white-space: pre-wrap;
    }
    .bubble.user      { background: #1a1a2e; color: #fff; align-self: flex-end; }
    .bubble.assistant { background: #fff; border: 1px solid #e0e0e0; align-self: flex-start; }
    .bubble.system    { background: #f0f0f0; color: #888; align-self: center;
                        font-size: 0.82rem; font-style: italic; }

    .overview-block {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-left: 4px solid #1a1a2e;
      border-radius: 12px;
      padding: 13px 16px;
      max-width: 580px;
      align-self: flex-start;
    }
    .overview-heading {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #1a1a2e;
      margin-bottom: 9px;
    }
    .overview-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
    .overview-list li { font-size: 0.9rem; line-height: 1.5; }
    .overview-label { font-weight: 600; }

    .answer-result {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 11px 15px;
      max-width: 580px;
      align-self: flex-start;
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .answer-result.correct { border-left: 4px solid #28a745; }
    .answer-result.wrong   { border-left: 4px solid #dc3545; }
    .answer-verdict { font-weight: 600; margin-bottom: 3px; }

    .suggestions-block {
      align-self: flex-start;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      max-width: 580px;
    }
    .suggestions-label {
      width: 100%;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #bbb;
      margin-bottom: 2px;
    }
    .suggestion-chip {
      padding: 5px 13px;
      background: #f0f0f0;
      border: 1px solid #ddd;
      border-radius: 20px;
      font-size: 0.84rem;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .suggestion-chip:hover { background: #dde8ff; border-color: #1a1a2e; }

    .spinner-row { align-self: flex-start; padding: 6px 2px; }
    .spinner {
      width: 20px; height: 20px;
      border: 3px solid #e0e0e0;
      border-top-color: #1a1a2e;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Input area ───────────────────────────────────────────────────────── */

    #input-area {
      background: #fff;
      border-top: 1px solid #e0e0e0;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .input-row { display: flex; gap: 8px; align-items: center; }

    .input-row label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #bbb;
      min-width: 34px;
    }

    .input-row input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.92rem;
      background: #f8f8f8;
      min-width: 0;
    }
    .input-row input:focus { outline: none; border-color: #1a1a2e; background: #fff; }
    .input-row input:disabled { opacity: 0.45; }

    .input-row button {
      padding: 8px 16px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .input-row button:disabled { opacity: 0.35; cursor: default; }

    /* ── Right panel: questions ───────────────────────────────────────────── */

    #panel {
      width: 440px;
      min-width: 340px;
      background: #fff;
      display: flex;
      flex-direction: column;
    }

    #panel-header {
      padding: 14px 14px 10px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #1a1a2e;
      border-bottom: 1px solid #f0f0f0;
    }

    #active-questions {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #panel-empty { margin: auto; color: #ccc; font-size: 0.85rem; text-align: center; }

    .topic-section { border-bottom: 1px solid #f0f0f0; }
    .topic-section:last-child { border-bottom: none; }

    .topic-header {
      padding: 8px 12px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      list-style: none;
      color: #1a1a2e;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
    }
    .topic-header::-webkit-details-marker { display: none; }
    .topic-header::before { content: '▶'; font-size: 0.6rem; transition: transform 0.15s; }
    details[open] > .topic-header::before { transform: rotate(90deg); }

    .topic-questions { padding: 0 8px 8px; display: flex; flex-direction: column; gap: 8px; }

    .q-card {
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 12px;
    }
    .q-card.review { border-left: 4px solid #f0a500; }

    .q-question {
      font-size: 0.87rem;
      font-weight: 600;
      margin-bottom: 9px;
      line-height: 1.45;
    }

    .q-choices { display: flex; flex-direction: column; gap: 5px; }

    .choice-btn {
      text-align: left;
      background: #f8f8f8;
      border: 1px solid #ddd;
      border-radius: 7px;
      padding: 7px 10px;
      cursor: pointer;
      font-size: 0.84rem;
      transition: background 0.1s;
    }
    .choice-btn:hover:not(:disabled) { background: #ebebeb; }
    .choice-btn:disabled { cursor: default; }
    .choice-btn.correct  { background: #d4edda; border-color: #28a745; color: #155724; font-weight: 600; }
    .choice-btn.wrong    { background: #f8d7da; border-color: #dc3545; color: #721c24; }
    .choice-btn.revealed { background: #d4edda; border-color: #28a745; color: #155724; font-weight: 600; }
    .q-rationale {
      margin-top: 10px;
      padding: 8px 10px;
      background: #f9f9f9;
      border-left: 3px solid #28a745;
      border-radius: 0 6px 6px 0;
      font-size: 0.8rem;
      color: #444;
      line-height: 1.5;
    }
    .q-rationale.wrong { border-left-color: #dc3545; }
    .q-card.answered { opacity: 0.75; }

    #panel-actions {
      padding: 10px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .panel-btn {
      width: 100%;
      padding: 8px;
      background: #f8f8f8;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.84rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.12s;
    }
    .panel-btn:hover:not(:disabled) { background: #ebebeb; }
    .panel-btn:disabled { opacity: 0.35; cursor: default; }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside id="sidebar">
  <div id="sidebar-title">Quizmaker</div>
  <button id="new-conv-btn">+ New Conversation</button>
  <div id="conv-list"></div>
</aside>

<!-- Center: thread + inputs -->
<div id="chat-col">
  <div id="thread">
    <div class="empty-state" id="thread-empty">Select or create a conversation</div>
  </div>
  <div id="input-area">
    <div class="input-row">
      <label>Topic</label>
      <input id="topic-input" placeholder="Enter a topic to study…" disabled />
      <button id="topic-btn" disabled>Start</button>
    </div>
    <div class="input-row">
      <label>Chat</label>
      <input id="chat-input" placeholder="Ask a question…" disabled />
      <button id="chat-btn" disabled>Send</button>
    </div>
  </div>
</div>

<!-- Right panel: active questions -->
<div id="panel">
  <div id="panel-header">Questions</div>
  <div id="active-questions">
    <div id="panel-empty">No active questions</div>
  </div>
  <div id="panel-actions">
    <button class="panel-btn" id="more-q-btn" disabled>+ More Questions</button>
    <button class="panel-btn" id="suggest-btn" disabled>Suggest Topics</button>
  </div>
</div>

<script>
  const thread      = document.getElementById('thread');
  const threadEmpty = document.getElementById('thread-empty');
  const topicInput  = document.getElementById('topic-input');
  const topicBtn    = document.getElementById('topic-btn');
  const chatInput   = document.getElementById('chat-input');
  const chatBtn     = document.getElementById('chat-btn');
  const activeQs    = document.getElementById('active-questions');
  const panelEmpty  = document.getElementById('panel-empty');
  const moreQBtn    = document.getElementById('more-q-btn');
  const suggestBtn  = document.getElementById('suggest-btn');
  const convList    = document.getElementById('conv-list');
  const newConvBtn  = document.getElementById('new-conv-btn');

  let activeConvId = null;
  let pendingTurns = 0;
  let currentTopicSection = null; // <details> element for the active topic

  // ── API ────────────────────────────────────────────────────────────────────

  async function api(method, path, body = null) {
    const opts = { method, headers: {} };
    if (body !== null) {
      opts.headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(body);
    }
    const res = await fetch(path, opts);
    if (!res.ok) {
      let detail = `HTTP ${res.status}`;
      try { detail = (await res.json()).detail ?? detail; } catch {}
      throw new Error(detail);
    }
    return res.json();
  }

  const get  = path        => api('GET', path);
  const post = (path, body) => api('POST', path, body ?? {});

  // ── Sidebar ────────────────────────────────────────────────────────────────

  async function loadSidebar() {
    const convs = await get('/conversations');
    renderSidebar(convs);
    if (convs.length === 1) selectConversation(convs[0].id);
  }

  function renderSidebar(convs) {
    convList.innerHTML = '';
    for (const c of convs) addSidebarItem(c);
  }

  function addSidebarItem(c) {
    const el = document.createElement('div');
    el.className = 'conv-item' + (c.id === activeConvId ? ' active' : '');
    el.textContent = c.title;
    el.dataset.id = c.id;
    el.onclick = () => selectConversation(c.id);
    convList.appendChild(el);
    return el;
  }

  function setSidebarActive(id) {
    convList.querySelectorAll('.conv-item').forEach(el =>
      el.classList.toggle('active', +el.dataset.id === id)
    );
  }

  function updateSidebarTitle(id, title) {
    const el = convList.querySelector(`[data-id="${id}"]`);
    if (el) el.textContent = title;
  }

  newConvBtn.addEventListener('click', async () => {
    const conv = await post('/conversations');
    activeConvId = conv.id;
    setSidebarActive(conv.id);
    // Prepend to sidebar
    const el = document.createElement('div');
    el.className = 'conv-item active';
    el.textContent = conv.title;
    el.dataset.id = conv.id;
    el.onclick = () => selectConversation(conv.id);
    convList.prepend(el);
    clearThread('Start by entering a topic above.');
    clearPanel();
    pendingTurns = 0;
    setInputsEnabled(true);
  });

  // ── Conversation loading ───────────────────────────────────────────────────

  async function selectConversation(id) {
    activeConvId = id;
    pendingTurns = 0;
    setSidebarActive(id);
    clearThread();
    clearPanel();
    setInputsEnabled(false);
    const data = await get(`/conversations/${id}`);
    for (const msg of data.messages) renderHistoryMessage(msg);
    renderPanelFromHistory(data.messages);
    thread.scrollTop = thread.scrollHeight;
    setInputsEnabled(true);
  }

  function renderHistoryMessage(msg) {
    let content;
    try { content = JSON.parse(msg.content_json); } catch { return; }

    if (msg.kind === 'overview') {
      appendOverview(content);
    } else if (msg.kind === 'chat') {
      appendBubble(msg.role, content.text || '');
    } else if (msg.kind === 'answer') {
      appendAnswerResult(content.correct, '');
    } else if (msg.kind === 'suggestions') {
      // suggestions are on-demand only (Suggest Topics button); skip in history
    }
    // question, review: live in the panel; skip in thread
  }

  // Rebuild panel from message history, grouped by topic section.
  function renderPanelFromHistory(messages) {
    // First pass: collect answers and reviews
    const answers  = new Map(); // item_id → {choice_index, correct}
    const reviewed = new Set(); // item_ids shown as review

    for (const msg of messages) {
      let c;
      try { c = JSON.parse(msg.content_json); } catch { continue; }
      if (msg.kind === 'answer' && c.item_id != null)         answers.set(c.item_id, c);
      if (msg.kind === 'review' && msg.quiz_item_id != null)  reviewed.add(msg.quiz_item_id);
    }

    // Second pass: create sections in order, all collapsed; last one opened at end
    const sections = [];
    let section = null;
    let fallbackIdx = 0;

    for (const msg of messages) {
      let c;
      try { c = JSON.parse(msg.content_json); } catch { continue; }

      if (msg.kind === 'overview') {
        const name = c.topic || `Topic ${++fallbackIdx}`;
        section = openTopicSection(name, false); // collapsed; will open last one below
        sections.push(section);
      } else if (msg.kind === 'question' && msg.quiz_item_id != null) {
        if (!section) { section = openTopicSection('Questions', false); sections.push(section); }
        const card = appendPanelQuestion(
          { item_id: msg.quiz_item_id, is_review: reviewed.has(msg.quiz_item_id), question: c.question, choices: c.choices },
          section,
        );
        const ans = answers.get(msg.quiz_item_id);
        if (ans != null) {
          card.querySelectorAll('.choice-btn').forEach((btn, i) => {
            btn.disabled = true;
            if (i === ans.choice_index && ans.correct) btn.classList.add('correct');
            else if (i === ans.choice_index)           btn.classList.add('wrong');
            else if (i === c.answer_index)             btn.classList.add('revealed');
          });
          const rat = document.createElement('div');
          rat.className = 'q-rationale' + (ans.correct ? '' : ' wrong');
          rat.textContent = c.rationale || '';
          card.appendChild(rat);
          card.classList.add('answered');
        }
      }
    }

    // Open only the most recent topic section
    if (sections.length > 0) {
      sections[sections.length - 1].open = true;
      currentTopicSection = sections[sections.length - 1];
    }
  }

  // ── Thread ─────────────────────────────────────────────────────────────────

  function clearThread(msg = 'Select or create a conversation') {
    thread.innerHTML = '';
    threadEmpty.textContent = msg;
    thread.appendChild(threadEmpty);
    threadEmpty.style.display = '';
  }

  function hideThreadEmpty() { threadEmpty.style.display = 'none'; }

  function appendBubble(role, text) {
    hideThreadEmpty();
    const el = document.createElement('div');
    el.className = `bubble ${role}`;
    el.textContent = text;
    thread.appendChild(el);
    thread.scrollTop = thread.scrollHeight;
    return el;
  }

  function appendOverview(data) {
    hideThreadEmpty();
    const block = document.createElement('div');
    block.className = 'overview-block';

    const heading = document.createElement('div');
    heading.className = 'overview-heading';
    heading.textContent = 'Key Facts';
    block.appendChild(heading);

    const ul = document.createElement('ul');
    ul.className = 'overview-list';
    for (const point of (data.points || [])) {
      const li = document.createElement('li');
      const idx = point.indexOf(': ');
      if (idx !== -1) {
        const label = document.createElement('span');
        label.className = 'overview-label';
        label.textContent = point.slice(0, idx) + ': ';
        li.appendChild(label);
        li.appendChild(document.createTextNode(point.slice(idx + 2)));
      } else {
        li.textContent = point;
      }
      ul.appendChild(li);
    }
    block.appendChild(ul);
    thread.appendChild(block);
    thread.scrollTop = thread.scrollHeight;
  }

  function appendAnswerResult(isCorrect, rationale) {
    hideThreadEmpty();
    const el = document.createElement('div');
    el.className = `answer-result ${isCorrect ? 'correct' : 'wrong'}`;
    const verdict = document.createElement('div');
    verdict.className = 'answer-verdict';
    verdict.textContent = isCorrect ? '✓ Correct!' : '✗ Incorrect';
    el.appendChild(verdict);
    if (rationale) {
      const r = document.createElement('div');
      r.textContent = rationale;
      el.appendChild(r);
    }
    thread.appendChild(el);
    thread.scrollTop = thread.scrollHeight;
  }

  function appendSuggestions(suggestions) {
    if (!suggestions.length) return;
    hideThreadEmpty();
    const block = document.createElement('div');
    block.className = 'suggestions-block';
    const label = document.createElement('div');
    label.className = 'suggestions-label';
    label.textContent = 'Explore next';
    block.appendChild(label);
    for (const s of suggestions) {
      const chip = document.createElement('button');
      chip.className = 'suggestion-chip';
      chip.textContent = s;
      chip.onclick = () => { topicInput.value = s; topicInput.focus(); };
      block.appendChild(chip);
    }
    thread.appendChild(block);
    thread.scrollTop = thread.scrollHeight;
  }

  function appendSystemMsg(text) {
    const el = document.createElement('div');
    el.className = 'bubble system';
    el.textContent = text;
    thread.appendChild(el);
    thread.scrollTop = thread.scrollHeight;
  }

  function showSpinner() {
    const el = document.createElement('div');
    el.className = 'spinner-row';
    el.innerHTML = '<div class="spinner"></div>';
    thread.appendChild(el);
    thread.scrollTop = thread.scrollHeight;
    return el;
  }

  // ── Panel ──────────────────────────────────────────────────────────────────

  function clearPanel() {
    activeQs.innerHTML = '';
    activeQs.appendChild(panelEmpty);
    panelEmpty.style.display = '';
    currentTopicSection = null;
  }

  function openTopicSection(topicName, expanded = true) {
    // Collapse current section if open
    if (currentTopicSection) currentTopicSection.open = false;
    panelEmpty.style.display = 'none';

    const section = document.createElement('details');
    section.className = 'topic-section';
    section.open = expanded;

    const summary = document.createElement('summary');
    summary.className = 'topic-header';
    summary.textContent = topicName;
    section.appendChild(summary);

    const body = document.createElement('div');
    body.className = 'topic-questions';
    section.appendChild(body);

    activeQs.appendChild(section);
    currentTopicSection = section;
    return section;
  }

  function renderPanelQuestions(questions) {
    for (const q of questions) appendPanelQuestion(q);
  }

  // Append a question card to a section (default: currentTopicSection) and return the card.
  function appendPanelQuestion(q, section = currentTopicSection) {
    const card = document.createElement('div');
    card.className = 'q-card' + (q.is_review ? ' review' : '');
    card.dataset.itemId = q.item_id;

    const qEl = document.createElement('div');
    qEl.className = 'q-question';
    qEl.textContent = q.question;
    card.appendChild(qEl);

    const choicesEl = document.createElement('div');
    choicesEl.className = 'q-choices';
    ['A', 'B', 'C', 'D'].forEach((letter, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = `${letter}. ${q.choices[i]}`;
      btn.onclick = () => submitAnswer(q.item_id, i, card);
      choicesEl.appendChild(btn);
    });
    card.appendChild(choicesEl);

    const target = section ? section.querySelector('.topic-questions') : activeQs;
    target.appendChild(card);
    return card;
  }

  // ── Enable/disable inputs ──────────────────────────────────────────────────

  function setInputsEnabled(on) {
    const hasConv = activeConvId !== null;
    topicInput.disabled = !on || !hasConv;
    topicBtn.disabled   = !on || !hasConv;
    chatInput.disabled  = !on || !hasConv;
    chatBtn.disabled    = !on || !hasConv;
    moreQBtn.disabled   = !on || !hasConv;
    suggestBtn.disabled = !on || !hasConv;
  }

  // ── Action flows ───────────────────────────────────────────────────────────

  topicBtn.addEventListener('click', () => {
    const topic = topicInput.value.trim();
    if (topic && activeConvId) doStartTopic(topic);
  });
  topicInput.addEventListener('keydown', e => { if (e.key === 'Enter') topicBtn.click(); });

  chatBtn.addEventListener('click', () => {
    const text = chatInput.value.trim();
    if (text && activeConvId) doChat(text);
  });
  chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') chatBtn.click(); });

  moreQBtn.addEventListener('click', () => { if (activeConvId) doMoreQuestions(); });
  suggestBtn.addEventListener('click', () => { if (activeConvId) doSuggestTopics(); });

  async function doStartTopic(topic) {
    setInputsEnabled(false);
    appendBubble('user', topic);
    const spinner = showSpinner();
    try {
      const data = await post(`/conversations/${activeConvId}/start-topic`, { topic, quiz_count: 3 });
      spinner.remove();
      appendOverview(data.overview);
      pendingTurns = 0;
      openTopicSection(topic);
      renderPanelQuestions(data.questions);
      const conv = await get(`/conversations/${activeConvId}`);
      updateSidebarTitle(activeConvId, conv.title);
      topicInput.value = '';
    } catch (e) {
      spinner.remove();
      appendSystemMsg(`Error: ${e.message}`);
    }
    setInputsEnabled(true);
  }

  async function doChat(text) {
    setInputsEnabled(false);
    chatInput.value = '';
    appendBubble('user', text);
    const spinner = showSpinner();
    try {
      const data = await post(`/conversations/${activeConvId}/chat`, { text });
      spinner.remove();
      appendBubble('assistant', data.reply);
      if (data.review) appendPanelQuestion(data.review);
    } catch (e) {
      spinner.remove();
      appendSystemMsg(`Error: ${e.message}`);
    }
    setInputsEnabled(true);
    chatInput.focus();
  }

  async function submitAnswer(itemId, choiceIndex, card) {
    card.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
    try {
      const data = await post(`/conversations/${activeConvId}/answer`, {
        item_id: itemId, choice_index: choiceIndex,
      });
      // Mark buttons correct/wrong/revealed
      const btns = card.querySelectorAll('.choice-btn');
      btns.forEach((btn, i) => {
        if (i === choiceIndex && i === data.correct_index) btn.classList.add('correct');
        else if (i === choiceIndex)        btn.classList.add('wrong');
        else if (i === data.correct_index) btn.classList.add('revealed');
      });
      // Show rationale inline on the card
      const rat = document.createElement('div');
      rat.className = 'q-rationale' + (data.is_correct ? '' : ' wrong');
      rat.textContent = data.rationale;
      card.appendChild(rat);
      card.classList.add('answered');
      // Batch turns: only advance when all current cards are answered
      pendingTurns++;
      if (!activeQs.querySelector('.q-card:not(.answered)')) {
        for (let i = 0; i < pendingTurns; i++) {
          const turn = await post(`/conversations/${activeConvId}/turn`).catch(() => null);
          if (turn?.review) appendPanelQuestion(turn.review);
        }
        pendingTurns = 0;
      }
    } catch (e) {
      appendSystemMsg(`Error: ${e.message}`);
      card.querySelectorAll('.choice-btn').forEach(b => b.disabled = false);
    }
  }

  async function doMoreQuestions() {
    setInputsEnabled(false);
    try {
      const data = await post(`/conversations/${activeConvId}/actions`, { action: 'more_questions', count: 3 });
      renderPanelQuestions(data.questions);
    } catch (e) {
      appendSystemMsg(`Error: ${e.message}`);
    }
    setInputsEnabled(true);
  }

  async function doSuggestTopics() {
    suggestBtn.disabled = true;
    try {
      const data = await post(`/conversations/${activeConvId}/actions`, { action: 'suggest_topics', count: 4 });
      appendSuggestions(data.suggestions);
    } catch (e) {
      appendSystemMsg(`Error: ${e.message}`);
    }
    suggestBtn.disabled = !activeConvId;
  }

  // ── Init ───────────────────────────────────────────────────────────────────

  loadSidebar();
</script>
</body>
</html>
