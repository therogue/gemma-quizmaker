<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemma Quizmaker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      height: 100dvh;
      overflow: hidden;
      background: #f7f7f8;
    }

    /* ── Sidebar ──────────────────────────────────────────────────────────── */

    #sidebar {
      width: 220px;
      min-width: 220px;
      flex-shrink: 0;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      color: #fff;
    }

    #sidebar-title {
      padding: 16px 14px 12px;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.6;
    }

    #new-conv-btn {
      margin: 0 10px 10px;
      padding: 8px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #fff;
      font-size: 0.86rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    #new-conv-btn:hover { background: rgba(255,255,255,0.16); }

    #conv-list { flex: 1; overflow-y: auto; padding: 0 6px 10px; }

    .conv-item {
      padding: 8px 10px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.86rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0.7;
      transition: background 0.12s, opacity 0.12s;
      margin-bottom: 2px;
    }
    .conv-item:hover  { background: rgba(255,255,255,0.1); opacity: 1; }
    .conv-item.active { background: rgba(255,255,255,0.16); opacity: 1; font-weight: 600; }

    /* ── Main content (resizable) ─────────────────────────────────────────── */

    #main-content {
      flex: 1;
      min-width: 0;
      display: flex;
      overflow: hidden;
    }

    /* ── Center: chat thread ──────────────────────────────────────────────── */

    #chat-col {
      flex: 1 1 0;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      background: #f7f7f8;
    }

    #thread {
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .empty-state {
      margin: auto;
      color: #aaa;
      font-size: 0.95rem;
      text-align: center;
      line-height: 1.8;
    }
    .empty-state strong {
      display: block;
      font-size: 1.15rem;
      color: #888;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .bubble {
      max-width: 620px;
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.65;
      font-size: 0.95rem;
      white-space: pre-wrap;
    }
    .bubble.user {
      background: #1a1a2e;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .bubble.assistant {
      background: #fff;
      border: 1px solid #e8e8e8;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      color: #1a1a1a;
    }
    .bubble.system {
      background: transparent;
      color: #bbb;
      align-self: center;
      font-size: 0.82rem;
      font-style: italic;
    }

    .overview-block {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-left: 4px solid #1a1a2e;
      border-radius: 14px;
      padding: 14px 18px;
      max-width: 620px;
      align-self: flex-start;
    }
    .overview-heading {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #1a1a2e;
      margin-bottom: 10px;
    }
    .overview-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .overview-list li { font-size: 0.9rem; line-height: 1.55; }
    .overview-label { font-weight: 600; }

    .suggestions-block {
      align-self: flex-start;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: 620px;
      padding: 4px 0;
    }
    .suggestions-label {
      width: 100%;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #bbb;
      margin-bottom: 2px;
    }
    .suggestion-chip {
      padding: 7px 16px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 20px;
      font-size: 0.86rem;
      cursor: pointer;
      color: #1a1a2e;
      transition: background 0.12s, border-color 0.12s;
    }
    .suggestion-chip:hover { background: #eef1ff; border-color: #1a1a2e; }

    .spinner-row { align-self: flex-start; padding: 6px 2px; }
    .spinner {
      width: 20px; height: 20px;
      border: 3px solid #e0e0e0;
      border-top-color: #1a1a2e;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Input area (Claude-style) ────────────────────────────────────────── */

    #input-area {
      padding: 10px 16px 20px;
    }

    #input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: #fff;
      border: 1.5px solid #d8d8d8;
      border-radius: 14px;
      padding: 10px 10px 10px 16px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    #input-wrapper:focus-within {
      border-color: #1a1a2e;
      box-shadow: 0 0 0 3px rgba(26,26,46,0.07), 0 1px 6px rgba(0,0,0,0.06);
    }

    #main-input {
      flex: 1;
      min-width: 0;
      border: none;
      outline: none;
      resize: none;
      font-size: 0.95rem;
      font-family: inherit;
      line-height: 1.55;
      max-height: 180px;
      overflow-y: auto;
      background: transparent;
      color: #1a1a1a;
    }
    #main-input::placeholder { color: #c0c0c0; }
    #main-input:disabled { opacity: 0.5; }

    #send-btn {
      width: 34px;
      height: 34px;
      flex-shrink: 0;
      border-radius: 9px;
      background: #1a1a2e;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s;
    }
    #send-btn:disabled { background: #d8d8d8; cursor: default; }
    #send-btn:not(:disabled):hover { background: #2d2d50; }

    /* ── Resize divider ───────────────────────────────────────────────────── */

    #divider {
      width: 5px;
      flex-shrink: 0;
      background: #e8e8e8;
      cursor: col-resize;
      transition: background 0.15s;
    }
    #divider:hover,
    #divider.dragging { background: #1a1a2e; }

    /* ── Right panel: questions ───────────────────────────────────────────── */

    #panel {
      flex: 1 1 0;
      min-width: 260px;
      background: #fff;
      display: flex;
      flex-direction: column;
    }

    #panel-header {
      padding: 14px 14px 10px;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #1a1a2e;
      border-bottom: 1px solid #f0f0f0;
      flex-shrink: 0;
    }

    #active-questions {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #panel-empty { margin: auto; color: #ccc; font-size: 0.85rem; text-align: center; }

    .topic-section { border-bottom: 1px solid #f0f0f0; }
    .topic-section:last-child { border-bottom: none; }

    .topic-header {
      padding: 8px 12px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      list-style: none;
      color: #1a1a2e;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
    }
    .topic-header::-webkit-details-marker { display: none; }
    .topic-header::before { content: '▶'; font-size: 0.6rem; transition: transform 0.15s; }
    details[open] > .topic-header::before { transform: rotate(90deg); }

    .topic-questions { padding: 0 8px 8px; display: flex; flex-direction: column; gap: 8px; }

    .q-card { border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px; }
    .q-card.review { border-left: 4px solid #f0a500; }

    .q-source {
      display: inline-block;
      margin-bottom: 8px;
      padding: 3px 7px;
      border-radius: 999px;
      background: #fff4d6;
      color: #7a5200;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .q-question { font-size: 0.87rem; font-weight: 600; margin-bottom: 9px; line-height: 1.45; }

    .q-choices { display: flex; flex-direction: column; gap: 5px; }

    .choice-btn {
      text-align: left;
      background: #f8f8f8;
      border: 1px solid #ddd;
      border-radius: 7px;
      padding: 7px 10px;
      cursor: pointer;
      font-size: 0.84rem;
      transition: background 0.1s;
    }
    .choice-btn:hover:not(:disabled) { background: #ebebeb; }
    .choice-btn:disabled { cursor: default; }
    .choice-btn.selected  { background: #e8f0ff; border-color: #6c8fdc; color: #1a2e66; }
    .choice-btn.correct   { background: #d4edda; border-color: #28a745; color: #155724; font-weight: 600; }
    .choice-btn.wrong     { background: #f8d7da; border-color: #dc3545; color: #721c24; }
    .choice-btn.revealed  { background: #d4edda; border-color: #28a745; color: #155724; font-weight: 600; }

    .q-hint { margin: -2px 0 7px; color: #aaa; font-size: 0.74rem; }

    .answer-submit {
      margin-top: 8px;
      width: 100%;
      border: none;
      border-radius: 7px;
      padding: 7px 10px;
      background: #1a1a2e;
      color: #fff;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
    }
    .answer-submit:disabled { opacity: 0.45; cursor: default; }

    .q-rationale {
      margin-top: 10px;
      padding: 8px 10px;
      background: #f9f9f9;
      border-left: 3px solid #28a745;
      border-radius: 0 6px 6px 0;
      font-size: 0.8rem;
      color: #444;
      line-height: 1.5;
    }
    .q-rationale.wrong { border-left-color: #dc3545; }
    .q-card.answered { opacity: 0.75; }

    #panel-actions {
      padding: 10px;
      border-top: 1px solid #f0f0f0;
      flex-shrink: 0;
    }

    .panel-btn {
      width: 100%;
      padding: 8px;
      background: #f8f8f8;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.84rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.12s;
    }
    .panel-btn:hover:not(:disabled) { background: #ebebeb; }
    .panel-btn:disabled { opacity: 0.35; cursor: default; }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside id="sidebar">
  <div id="sidebar-title">Quizmaker</div>
  <button id="new-conv-btn">+ New Conversation</button>
  <div id="conv-list"></div>
</aside>

<!-- Main content: chat + divider + panel -->
<div id="main-content">

  <!-- Center: thread + input -->
  <div id="chat-col">
    <div id="thread">
      <div class="empty-state" id="thread-empty">
        <strong>Gemma Quizmaker</strong>
        Enter a topic to study, or ask a question
      </div>
    </div>
    <div id="input-area">
      <div id="input-wrapper">
        <textarea
          id="main-input"
          placeholder="Ask a question or enter a topic to study…"
          rows="1"
          disabled
        ></textarea>
        <button id="send-btn" disabled title="Send (Enter)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 13V3M8 3L3 8M8 3L13 8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Resize divider -->
  <div id="divider"></div>

  <!-- Right panel: active questions -->
  <div id="panel">
    <div id="panel-header">Questions</div>
    <div id="active-questions">
      <div id="panel-empty">No active questions</div>
    </div>
    <div id="panel-actions">
      <button class="panel-btn" id="more-q-btn" disabled>+ More Questions</button>
    </div>
  </div>

</div>

<script>
  const thread      = document.getElementById('thread');
  const threadEmpty = document.getElementById('thread-empty');
  const mainInput   = document.getElementById('main-input');
  const sendBtn     = document.getElementById('send-btn');
  const activeQs    = document.getElementById('active-questions');
  const panelEmpty  = document.getElementById('panel-empty');
  const moreQBtn    = document.getElementById('more-q-btn');
  const convList    = document.getElementById('conv-list');
  const newConvBtn  = document.getElementById('new-conv-btn');
  const dividerEl   = document.getElementById('divider');
  const chatCol     = document.getElementById('chat-col');
  const panel       = document.getElementById('panel');
  const mainContent = document.getElementById('main-content');

  let activeConvId = null;
  let pendingReviews = [];
  let currentTopicSection = null;
  let hasSuggested = false;

  // ── Resize logic ───────────────────────────────────────────────────────────

  let isResizing = false;

  dividerEl.addEventListener('mousedown', (e) => {
    isResizing = true;
    dividerEl.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!isResizing) return;
    const rect = mainContent.getBoundingClientRect();
    const divW = 5;
    const available = rect.width - divW;
    const chatWidth = Math.max(300, Math.min(available - 260, e.clientX - rect.left));
    const panelWidth = available - chatWidth;
    chatCol.style.flex = `0 0 ${chatWidth}px`;
    panel.style.flex   = `0 0 ${panelWidth}px`;
  });

  document.addEventListener('mouseup', () => {
    if (!isResizing) return;
    isResizing = false;
    dividerEl.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });

  // ── Input: auto-grow + send ────────────────────────────────────────────────

  mainInput.addEventListener('input', () => {
    mainInput.style.height = 'auto';
    mainInput.style.height = mainInput.scrollHeight + 'px';
  });

  mainInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendBtn.click();
    }
  });

  sendBtn.addEventListener('click', () => {
    const text = mainInput.value.trim();
    if (text && activeConvId) doSend(text);
  });

  // ── API ────────────────────────────────────────────────────────────────────

  async function api(method, path, body = null) {
    const opts = { method, headers: {} };
    if (body !== null) {
      opts.headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(body);
    }
    const res = await fetch(path, opts);
    if (!res.ok) {
      let detail = `HTTP ${res.status}`;
      try { detail = (await res.json()).detail ?? detail; } catch {}
      throw new Error(detail);
    }
    return res.json();
  }

  const get  = path         => api('GET', path);
  const post = (path, body) => api('POST', path, body ?? {});

  // ── Sidebar ────────────────────────────────────────────────────────────────

  async function loadSidebar() {
    const convs = await get('/conversations');
    renderSidebar(convs);
    if (convs.length === 1) selectConversation(convs[0].id);
  }

  function renderSidebar(convs) {
    convList.innerHTML = '';
    for (const c of convs) addSidebarItem(c);
  }

  function addSidebarItem(c) {
    const el = document.createElement('div');
    el.className = 'conv-item' + (c.id === activeConvId ? ' active' : '');
    el.textContent = c.title;
    el.dataset.id = c.id;
    el.onclick = () => selectConversation(c.id);
    convList.appendChild(el);
    return el;
  }

  function setSidebarActive(id) {
    convList.querySelectorAll('.conv-item').forEach(el =>
      el.classList.toggle('active', +el.dataset.id === id)
    );
  }

  function updateSidebarTitle(id, title) {
    const el = convList.querySelector(`[data-id="${id}"]`);
    if (el) el.textContent = title;
  }

  newConvBtn.addEventListener('click', async () => {
    const conv = await post('/conversations');
    activeConvId = conv.id;
    setSidebarActive(conv.id);
    const el = document.createElement('div');
    el.className = 'conv-item active';
    el.textContent = conv.title;
    el.dataset.id = conv.id;
    el.onclick = () => selectConversation(conv.id);
    convList.prepend(el);
    clearThread();
    clearPanel();
    pendingReviews = [];
    hasSuggested = false;
    setInputsEnabled(true);
  });

  // ── Conversation loading ───────────────────────────────────────────────────

  async function selectConversation(id) {
    activeConvId = id;
    pendingReviews = [];
    hasSuggested = false;
    setSidebarActive(id);
    clearThread();
    clearPanel();
    setInputsEnabled(false);
    const data = await get(`/conversations/${id}`);
    for (const msg of data.messages) renderHistoryMessage(msg);
    renderPanelFromHistory(data.messages);
    thread.scrollTop = thread.scrollHeight;
    setInputsEnabled(true);
  }

  function renderHistoryMessage(msg) {
    let content;
    try { content = JSON.parse(msg.content_json); } catch { return; }
    if (msg.kind === 'topic')    appendBubble('user', content.text || '');
    else if (msg.kind === 'overview') appendOverview(content);
    else if (msg.kind === 'chat')     appendBubble(msg.role, content.text || '');
  }

  function renderPanelFromHistory(messages) {
    const answers  = new Map();
    const reviewed = new Set();

    for (const msg of messages) {
      let c;
      try { c = JSON.parse(msg.content_json); } catch { continue; }
      if (msg.kind === 'answer' && c.item_id != null)        answers.set(c.item_id, c);
      if (msg.kind === 'review' && msg.quiz_item_id != null) reviewed.add(msg.quiz_item_id);
    }

    const sections = [];
    let section = null;
    let fallbackIdx = 0;

    for (const msg of messages) {
      let c;
      try { c = JSON.parse(msg.content_json); } catch { continue; }

      if (msg.kind === 'overview') {
        const name = c.topic || `Topic ${++fallbackIdx}`;
        section = openTopicSection(name, false);
        sections.push(section);
      } else if (msg.kind === 'question' && msg.quiz_item_id != null) {
        if (!section) { section = openTopicSection('Questions', false); sections.push(section); }
        const card = appendPanelQuestion(
          { item_id: msg.quiz_item_id, is_review: reviewed.has(msg.quiz_item_id),
            topic: c.topic, question: c.question, choices: c.choices },
          section,
        );
        const ans = answers.get(msg.quiz_item_id);
        if (ans != null) {
          const selectedIndices = ans.choice_indices ?? (ans.choice_index != null ? [ans.choice_index] : []);
          const correctIndices  = ans.correct_indices ?? (ans.correct_index != null ? [ans.correct_index] : (c.answer_indices ?? []));
          const selectedSet = new Set(selectedIndices);
          const correctSet  = new Set(correctIndices);
          card.querySelectorAll('.choice-btn').forEach((btn, i) => {
            btn.disabled = true;
            if (selectedSet.has(i) && correctSet.has(i)) btn.classList.add('correct');
            else if (selectedSet.has(i))                 btn.classList.add('wrong');
            else if (correctSet.has(i))                  btn.classList.add('revealed');
          });
          const submit = card.querySelector('.answer-submit');
          if (submit) submit.disabled = true;
          const rat = document.createElement('div');
          rat.className = 'q-rationale' + (ans.correct ? '' : ' wrong');
          rat.textContent = ans.rationale || c.rationale || '';
          card.appendChild(rat);
          card.classList.add('answered');
        }
      }
    }

    if (sections.length > 0) {
      sections[sections.length - 1].open = true;
      currentTopicSection = sections[sections.length - 1];
    }
  }

  // ── Thread ─────────────────────────────────────────────────────────────────

  function clearThread() {
    thread.innerHTML = '';
    thread.appendChild(threadEmpty);
    threadEmpty.style.display = '';
  }

  function hideThreadEmpty() { threadEmpty.style.display = 'none'; }

  function appendBubble(role, text) {
    hideThreadEmpty();
    const el = document.createElement('div');
    el.className = `bubble ${role}`;
    el.textContent = text;
    thread.appendChild(el);
    thread.scrollTop = thread.scrollHeight;
    return el;
  }

  function appendOverview(data) {
    hideThreadEmpty();
    const block = document.createElement('div');
    block.className = 'overview-block';
    const heading = document.createElement('div');
    heading.className = 'overview-heading';
    heading.textContent = 'Key Facts';
    block.appendChild(heading);
    const ul = document.createElement('ul');
    ul.className = 'overview-list';
    for (const point of (data.points || [])) {
      const li = document.createElement('li');
      const idx = point.indexOf(': ');
      if (idx !== -1) {
        const label = document.createElement('span');
        label.className = 'overview-label';
        label.textContent = point.slice(0, idx) + ': ';
        li.appendChild(label);
        li.appendChild(document.createTextNode(point.slice(idx + 2)));
      } else {
        li.textContent = point;
      }
      ul.appendChild(li);
    }
    block.appendChild(ul);
    thread.appendChild(block);
    thread.scrollTop = thread.scrollHeight;
  }

  function appendSuggestions(suggestions) {
    if (!suggestions.length) return;
    hideThreadEmpty();
    const block = document.createElement('div');
    block.className = 'suggestions-block';
    const label = document.createElement('div');
    label.className = 'suggestions-label';
    label.textContent = 'Explore next';
    block.appendChild(label);
    for (const s of suggestions) {
      const chip = document.createElement('button');
      chip.className = 'suggestion-chip';
      chip.textContent = s;
      chip.onclick = () => {
        mainInput.value = s;
        mainInput.style.height = 'auto';
        mainInput.style.height = mainInput.scrollHeight + 'px';
        mainInput.focus();
      };
      block.appendChild(chip);
    }
    thread.appendChild(block);
    thread.scrollTop = thread.scrollHeight;
  }

  function appendSystemMsg(text) {
    const el = document.createElement('div');
    el.className = 'bubble system';
    el.textContent = text;
    thread.appendChild(el);
    thread.scrollTop = thread.scrollHeight;
  }

  function showSpinner() {
    const el = document.createElement('div');
    el.className = 'spinner-row';
    el.innerHTML = '<div class="spinner"></div>';
    thread.appendChild(el);
    thread.scrollTop = thread.scrollHeight;
    return el;
  }

  // ── Panel ──────────────────────────────────────────────────────────────────

  function clearPanel() {
    activeQs.innerHTML = '';
    activeQs.appendChild(panelEmpty);
    panelEmpty.style.display = '';
    currentTopicSection = null;
  }

  function openTopicSection(topicName, expanded = true) {
    if (currentTopicSection) currentTopicSection.open = false;
    panelEmpty.style.display = 'none';
    const section = document.createElement('details');
    section.className = 'topic-section';
    section.open = expanded;
    const summary = document.createElement('summary');
    summary.className = 'topic-header';
    summary.textContent = topicName;
    section.appendChild(summary);
    const body = document.createElement('div');
    body.className = 'topic-questions';
    section.appendChild(body);
    activeQs.appendChild(section);
    currentTopicSection = section;
    return section;
  }

  function renderPanelQuestions(questions) {
    for (const q of questions) appendPanelQuestion(q);
  }

  function appendPanelQuestion(q, section = currentTopicSection) {
    const card = document.createElement('div');
    card.className = 'q-card' + (q.is_review ? ' review' : '');
    card.dataset.itemId = q.item_id;

    if (q.is_review && q.topic) {
      const source = document.createElement('div');
      source.className = 'q-source';
      source.textContent = `Review: ${q.topic}`;
      card.appendChild(source);
    }

    const qEl = document.createElement('div');
    qEl.className = 'q-question';
    qEl.textContent = q.question;
    card.appendChild(qEl);

    if (q.multi_correct) {
      const hint = document.createElement('div');
      hint.className = 'q-hint';
      hint.textContent = 'Select one or more.';
      card.appendChild(hint);
    }

    const choicesEl = document.createElement('div');
    choicesEl.className = 'q-choices';
    const selected = new Set();
    ['A', 'B', 'C', 'D'].forEach((letter, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = `${letter}. ${q.choices[i]}`;
      btn.onclick = () => {
        if (card.classList.contains('answered')) return;
        if (q.multi_correct) {
          if (selected.has(i)) {
            selected.delete(i);
            btn.classList.remove('selected');
          } else {
            selected.add(i);
            btn.classList.add('selected');
          }
          submit.disabled = selected.size === 0;
        } else {
          selected.clear();
          selected.add(i);
          btn.classList.add('selected');
          submitAnswer(q.item_id, [i], card);
        }
      };
      choicesEl.appendChild(btn);
    });
    card.appendChild(choicesEl);

    let submit = null;
    if (q.multi_correct) {
      submit = document.createElement('button');
      submit.className = 'answer-submit';
      submit.textContent = 'Submit';
      submit.disabled = true;
      submit.onclick = () => submitAnswer(q.item_id, Array.from(selected), card);
      card.appendChild(submit);
    }

    const target = section ? section.querySelector('.topic-questions') : activeQs;
    target.appendChild(card);
    return card;
  }

  // ── Enable/disable inputs ──────────────────────────────────────────────────

  function setInputsEnabled(on) {
    const hasConv = activeConvId !== null;
    mainInput.disabled = !on || !hasConv;
    sendBtn.disabled   = !on || !hasConv;
    moreQBtn.disabled  = !on || !hasConv;
  }

  // ── Unified send ───────────────────────────────────────────────────────────

  async function doSend(text) {
    setInputsEnabled(false);
    mainInput.value = '';
    mainInput.style.height = 'auto';
    appendBubble('user', text);
    const spinner = showSpinner();
    try {
      const data = await post(`/conversations/${activeConvId}/message`, { text });
      spinner.remove();

      if (data.overview) {
        appendOverview(data.overview);
        openTopicSection(data.overview.topic || text);
        renderPanelQuestions(data.questions || []);
        const conv = await get(`/conversations/${activeConvId}`);
        updateSidebarTitle(activeConvId, conv.title);
        pendingReviews = [];
        hasSuggested = false;
      } else if (data.reply != null) {
        appendBubble('assistant', data.reply);
        if (data.review) appendPanelQuestion(data.review);
      }
    } catch (e) {
      spinner.remove();
      appendSystemMsg(`Error: ${e.message}`);
    }
    setInputsEnabled(true);
    mainInput.focus();
  }

  async function submitAnswer(itemId, choiceIndices, card) {
    card.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
    const submit = card.querySelector('.answer-submit');
    if (submit) submit.disabled = true;
    try {
      const data = await post(`/conversations/${activeConvId}/answer`, {
        item_id: itemId, choice_indices: choiceIndices,
      });
      const btns = card.querySelectorAll('.choice-btn');
      const selectedSet = new Set(choiceIndices);
      const correctIndices = data.correct_indices ?? (data.correct_index != null ? [data.correct_index] : []);
      const correctSet = new Set(correctIndices);
      btns.forEach((btn, i) => {
        btn.classList.remove('selected');
        if (selectedSet.has(i) && correctSet.has(i)) btn.classList.add('correct');
        else if (selectedSet.has(i))                 btn.classList.add('wrong');
        else if (correctSet.has(i))                  btn.classList.add('revealed');
      });
      const rat = document.createElement('div');
      rat.className = 'q-rationale' + (data.is_correct ? '' : ' wrong');
      rat.textContent = data.rationale;
      card.appendChild(rat);
      card.classList.add('answered');
      if (data.review) pendingReviews.push(data.review);
      flushPendingReviewsIfReady();
    } catch (e) {
      appendSystemMsg(`Error: ${e.message}`);
      card.querySelectorAll('.choice-btn').forEach(b => b.disabled = false);
      if (submit) submit.disabled = false;
    }
  }

  async function doMoreQuestions() {
    setInputsEnabled(false);
    try {
      const data = await post(`/conversations/${activeConvId}/actions`, { action: 'more_questions', count: 3 });
      renderPanelQuestions(data.questions);
      hasSuggested = false;
    } catch (e) {
      appendSystemMsg(`Error: ${e.message}`);
    }
    setInputsEnabled(true);
  }

  function flushPendingReviewsIfReady() {
    if (activeQs.querySelector('.q-card:not(.answered)')) return;
    for (const review of pendingReviews) appendPanelQuestion(review);
    pendingReviews = [];
    // Auto-suggest once all questions (including flushed reviews) are answered
    if (!hasSuggested && !activeQs.querySelector('.q-card:not(.answered)') && activeConvId) {
      hasSuggested = true;
      doSuggestTopics();
    }
  }

  async function doSuggestTopics() {
    try {
      const data = await post(`/conversations/${activeConvId}/actions`, { action: 'suggest_topics', count: 4 });
      appendSuggestions(data.suggestions);
    } catch (e) {
      appendSystemMsg(`Error: ${e.message}`);
    }
  }

  moreQBtn.addEventListener('click', () => { if (activeConvId) doMoreQuestions(); });

  // ── Init ───────────────────────────────────────────────────────────────────

  loadSidebar();
</script>
</body>
</html>
